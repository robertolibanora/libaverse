<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>{{ title if title else "LIBAVERSE" }}</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="{{ url_for('static', filename='app/css/app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app/ui/avatar.css') }}">
  <script src="{{ url_for('static', filename='app/ui/avatar.js') }}"></script>
  {% block head_extra %}{% endblock %}
</head>

<body class="app">
  {% include "_partials/topbar.html" %}
    <!-- GLOBAL LIBA AVATAR -->
<div id="liba-avatar"
     class="liba-avatar"
     data-world="{{ request.path.split('/')[-1] if request.path.startswith('/world/') else 'hub' }}"
     data-equipped-skin="{{ state.equipped_skin if state and state.equipped_skin else '' }}">
  <img id="liba-avatar-img"
       src="{{ url_for('static', filename='app/ui/avatar/default.png') }}"
       alt="Liba Avatar">
</div>
  <main class="screen">
    {% block content %}{% endblock %}
  </main>

  {% include "_partials/nav.html" %}
  {% include "_partials/toast.html" %}

  <script src="{{ url_for('static', filename='app/js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='app/js/state.js') }}"></script>
  <script src="{{ url_for('static', filename='app/js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
